<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Fuel Calculator</title>
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="icon-nou-192.png">
  <meta name="theme-color" content="#09090f">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="card">

    <div class="header">
      <div class="icon-wrap">
        <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
          <path d="M3 19V5a2 2 0 0 1 2-2h8a2 2 0 0 1 2 2v6h1a2 2 0 0 1 2 2v4a1 1 0 0 0 2 0v-6l-2-2M3 19a1 1 0 0 0 1 1h10a1 1 0 0 0 1-1M3 19h12M7 8h4"/>
        </svg>
      </div>
      <div class="header-text">
        <h1 id="app-titlu">Fuel Calculator</h1>
        <p id="app-subtitlu">Estimate the cost before or after your trip</p>
      </div>
      <button id="btn-limba" onclick="schimbaLimba()" aria-label="Switch language">RO</button>
    </div>

    <div class="fields">
      <div class="field">
        <label id="label-distanta" for="distanta">Distance</label>
        <div class="input-wrap">
          <input type="number" id="distanta" placeholder="150" step="any" min="0.1" max="50000">
          <span class="unit">km</span>
        </div>
      </div>

      <div class="field">
        <label id="label-consum" for="consum">Avg. consumption</label>
        <div class="input-wrap">
          <input type="number" id="consum" placeholder="6.5" step="any" min="2" max="50">
          <span class="unit">L/100</span>
        </div>
      </div>

      <div class="field">
        <label id="label-pret" for="pret">Fuel price</label>
        <div class="input-wrap">
          <input type="number" id="pret" placeholder="7.20" step="any" min="0.1" max="100">
          <span class="unit">RON/L</span>
        </div>
      </div>
    </div>

    <button id="btn-calculeaza" onclick="calculeaza()">Calculate</button>

    <div id="rezultat-wrap" style="display:none">
      <div class="divider"></div>
      <div id="rezultat"></div>
    </div>

  </div>

  <script src="app.js"></script>
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('sw.js');
      });
    }
  </script>
</body>
</html>
