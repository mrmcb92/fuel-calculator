<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Fuel Calculator</title>
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="icon-nou-192.png">
  <meta name="theme-color" content="#09090f">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="card">

    <div class="header">
      <div class="icon-wrap">
        <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
          <path d="M3 19V5a2 2 0 0 1 2-2h8a2 2 0 0 1 2 2v6h1a2 2 0 0 1 2 2v4a1 1 0 0 0 2 0v-6l-2-2M3 19a1 1 0 0 0 1 1h10a1 1 0 0 0 1-1M3 19h12M7 8h4"/>
        </svg>
      </div>
      <div class="header-text">
        <h1 id="app-titlu">Fuel Calculator</h1>
        <p id="app-subtitlu">Estimate the cost before or after your trip</p>
      </div>
      <button id="btn-limba" onclick="schimbaLimba()" aria-label="Switch language">RO</button>
    </div>

    <div class="tabs">
      <button class="tab active" id="tab-cost" onclick="setTab('cost')"><span id="tab-cost-label">Cost</span></button>
      <button class="tab" id="tab-range" onclick="setTab('range')"><span id="tab-range-label">Range</span></button>
      <button class="tab" id="tab-history" onclick="setTab('history')"><span id="tab-history-label">History</span></button>
    </div>

    <!-- ── TAB: COST ── -->
    <div id="panel-cost" class="panel">

      <div class="profile-row">
        <select id="profile-select" onchange="loadProfile()">
          <option value="" id="profile-default-opt">— Vehicle —</option>
        </select>
        <button class="icon-btn" id="btn-save-profile" onclick="saveProfile()" aria-label="Save profile">+</button>
        <button class="icon-btn" id="btn-del-profile" onclick="deleteProfile()" aria-label="Delete profile">&times;</button>
      </div>

      <div class="fields">

        <div class="field">
          <div class="field-header">
            <label id="label-distanta" for="distanta">Distance</label>
            <label class="inline-check">
              <input type="checkbox" id="tur-retur" onchange="recalculeaza()">
              <span id="label-tur-retur">Round trip</span>
            </label>
          </div>
          <div class="input-wrap">
            <input type="number" id="distanta" inputmode="decimal" placeholder="150" step="any" min="0.1" max="50000" oninput="recalculeaza()">
            <span class="unit">km</span>
          </div>
        </div>

        <div class="field">
          <div class="field-header">
            <label id="label-consum" for="consum">Avg. consumption</label>
            <div class="seg-ctrl" id="consum-unit-toggle">
              <button class="seg active" data-unit="L100" onclick="setConsumUnit('L100')">L/100</button>
              <button class="seg" data-unit="kmL" onclick="setConsumUnit('kmL')">km/L</button>
              <button class="seg" data-unit="mpg" onclick="setConsumUnit('mpg')">mpg</button>
            </div>
          </div>
          <div class="input-wrap">
            <input type="number" id="consum" inputmode="decimal" placeholder="6.5" step="any" min="0.1" max="999" oninput="recalculeaza()">
            <span class="unit" id="unit-consum">L/100</span>
          </div>
        </div>

        <div class="field">
          <div class="field-header">
            <label id="label-pret" for="pret">Fuel price</label>
            <div class="seg-ctrl" id="currency-toggle">
              <button class="seg active" data-cur="RON" onclick="setCurrency('RON')">RON</button>
              <button class="seg" data-cur="EUR" onclick="setCurrency('EUR')">EUR</button>
              <button class="seg" data-cur="USD" onclick="setCurrency('USD')">USD</button>
            </div>
          </div>
          <div class="input-wrap">
            <input type="number" id="pret" inputmode="decimal" placeholder="7.20" step="any" min="0.1" max="1000" oninput="recalculeaza()">
            <span class="unit" id="unit-pret">RON/L</span>
          </div>
        </div>

        <div class="field" id="field-pasageri">
          <div class="field-header">
            <label id="label-pasageri" for="pasageri">Passengers</label>
            <label class="inline-check">
              <input type="checkbox" id="split-toggle" onchange="toggleSplit()">
              <span id="label-split">Split cost</span>
            </label>
          </div>
          <div class="input-wrap" id="pasageri-wrap" style="display:none">
            <input type="number" id="pasageri" inputmode="numeric" placeholder="2" step="1" min="1" max="20" value="2" oninput="recalculeaza()">
            <span class="unit" id="unit-pasageri">pax</span>
          </div>
        </div>

      </div>

      <div class="btn-row">
        <button id="btn-reset" onclick="resetForm()"><span id="label-btn-reset">Reset</span></button>
        <button id="btn-calculeaza" onclick="calculeaza()"><span id="label-btn-calc">Calculate</span></button>
      </div>

      <div id="rezultat-wrap" style="display:none">
        <div class="divider"></div>
        <div id="rezultat"></div>
        <div class="share-row" id="share-row" style="display:none">
          <button id="btn-share" onclick="shareResult()"><span id="label-share">Share</span></button>
        </div>
      </div>

    </div>

    <!-- ── TAB: RANGE ── -->
    <div id="panel-range" class="panel" style="display:none">
      <div class="fields">

        <div class="field">
          <label id="label-buget" for="buget">Budget</label>
          <div class="input-wrap">
            <input type="number" id="buget" inputmode="decimal" placeholder="200" step="any" min="0.1" oninput="calcRange()">
            <span class="unit" id="unit-buget">RON</span>
          </div>
        </div>

        <div class="field">
          <label id="label-consum-r" for="consum-r">Avg. consumption</label>
          <div class="input-wrap">
            <input type="number" id="consum-r" inputmode="decimal" placeholder="6.5" step="any" min="0.1" max="999" oninput="calcRange()">
            <span class="unit">L/100</span>
          </div>
        </div>

        <div class="field">
          <label id="label-pret-r" for="pret-r">Fuel price</label>
          <div class="input-wrap">
            <input type="number" id="pret-r" inputmode="decimal" placeholder="7.20" step="any" min="0.1" oninput="calcRange()">
            <span class="unit" id="unit-pret-r">RON/L</span>
          </div>
        </div>

      </div>

      <div id="range-result-wrap" style="display:none">
        <div class="divider"></div>
        <div id="range-rezultat"></div>
      </div>
    </div>

    <!-- ── TAB: HISTORY ── -->
    <div id="panel-history" class="panel" style="display:none">
      <div id="history-list"></div>
      <button id="btn-clear-history" onclick="clearHistory()" style="display:none">
        <span id="label-clear-history">Clear history</span>
      </button>
    </div>

  </div>

  <div id="toast"></div>

  <script src="app.js"></script>
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('sw.js');
      });
    }
  </script>
</body>
</html>
